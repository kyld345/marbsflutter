name: marbin_barbershop
description: Marbin Barbershop - Full Appointment System for Web & Mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  lottie: ^3.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  pdf: ^3.11.0
  printing: ^5.13.1
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: MarbinSans
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
      